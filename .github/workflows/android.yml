name: Android

on:
  pull_request:
  push:
    branches: [main]

jobs:
  version-check:
    # Dependabot action bumps don't ship in the APK — no version bump required.
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Enforce version bump vs ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=1

          pr_vc=$(grep -oP 'versionCode = \K\d+' watchface/build.gradle.kts)
          pr_vn=$(grep -oP 'versionName = "\K[^"]+' watchface/build.gradle.kts)
          echo "PR:   versionCode=$pr_vc versionName=$pr_vn"

          if ! base=$(git show "origin/${{ github.base_ref }}:watchface/build.gradle.kts" 2>/dev/null); then
            echo "Base branch has no watchface/build.gradle.kts — first merge, skipping checks."
            exit 0
          fi
          base_vc=$(grep -oP 'versionCode = \K\d+' <<<"$base")
          base_vn=$(grep -oP 'versionName = "\K[^"]+' <<<"$base")
          echo "Base: versionCode=$base_vc versionName=$base_vn"

          if [ "$pr_vc" -le "$base_vc" ]; then
            echo "::error::versionCode must be bumped on every branch change ($pr_vc <= $base_vc)"
            exit 1
          fi
          if [ "$pr_vn" = "$base_vn" ]; then
            echo "::error::versionName must be bumped once per PR to ${{ github.base_ref }} (still $pr_vn)"
            exit 1
          fi
          echo "Version bump OK."

  docs-format:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Prettier check on Markdown
        run: npx --yes prettier --check "**/*.md"

  build:
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_B64 != '' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6

      - name: Restore release keystore
        if: env.HAS_KEYSTORE == 'true'
        run: |
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > release.jks
          {
            echo "storeFile=release.jks"
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}"
            # Shared signing key with regatta-timer (same keystore + secrets)
            echo "keyAlias=regatta"
            echo "keyPassword=${{ secrets.KEYSTORE_PASSWORD }}"
          } > keystore.properties

      # WFF is declarative XML — no unit tests; the validators below are the test suite.
      - name: Build
        run: ./gradlew --no-daemon :watchface:assembleRelease

      - name: Check out WFF validation tools
        run: git clone --depth 1 https://github.com/google/watchface.git /tmp/wff-tools

      - name: WFF format validation
        run: |
          set -euo pipefail
          cd /tmp/wff-tools/third_party/wff
          ./gradlew --no-daemon -q :specification:validator:executable-jar
          # The validator exits 0 even on FAILED — gate on its output instead.
          # Validator logs to stderr — merge streams so the gate can see PASSED
          java -jar specification/validator/build/libs/wff-validator.jar 3 \
            "$GITHUB_WORKSPACE/watchface/src/main/res/raw/watchface.xml" 2>&1 | tee validator.log
          grep -q "PASSED" validator.log

      - name: WFF memory footprint validation
        run: |
          set -euo pipefail
          cd /tmp/wff-tools/play-validations
          ./gradlew --no-daemon -q :memory-footprint:executable-jar
          # Glob: the APK is watchface-release.apk when signed, -unsigned.apk without the keystore secret
          java -jar memory-footprint/build/libs/memory-footprint.jar \
            --watch-face "$GITHUB_WORKSPACE"/watchface/build/outputs/apk/release/watchface-release*.apk \
            --schema-version 3 \
            --ambient-limit-mb 10 \
            --active-limit-mb 100 \
            --apply-v1-offload-limitations \
            --estimate-optimization

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: Orrery-apk
          path: watchface/build/outputs/apk/release/watchface-release*.apk

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: Orrery-apk

      - name: Create GitHub release with APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          vn=$(grep -oP 'versionName = "\K[^"]+' watchface/build.gradle.kts)
          vc=$(grep -oP 'versionCode = \K\d+' watchface/build.gradle.kts)
          mv watchface-release*.apk "Orrery-v${vn}.apk"
          # The squash commit body IS the changelog (repo squashes with PR_BODY).
          git log -1 --format=%b > notes.md
          printf '\n---\nversionCode %s · sideload instructions in the README\n' "${vc}" >> notes.md
          gh release create "v${vn}" "Orrery-v${vn}.apk" \
            --title "Orrery v${vn}" \
            --notes-file notes.md \
            || echo "Release v${vn} already exists; skipping."
